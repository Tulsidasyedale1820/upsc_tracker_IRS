<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRS Portal - Initialize Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-primary { background: #2563eb; border: none; }
        .btn-primary:hover { background: #1d4ed8; }
        .form-control { background: #ffffff !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; padding: 8px 12px; }
        p { text-align: left; margin-bottom: 1rem; }
        label { font-weight: 600; font-size: 0.85rem; color: #475569; display: block; margin-bottom: 4px; }
        .helptext { font-size: 0.75rem; color: #64748b; display: block; margin-top: 4px; line-height: 1.3; }
        ul { padding-left: 1.2rem; font-size: 0.75rem; color: #64748b; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h2 class="fw-bold text-primary mb-1">IRS Portal</h2>
        <p class="text-secondary small fw-bold tracking-wider text-uppercase text-center mb-4">Initialize Matrix Profile</p>
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            
            {% if form.errors %}
                <div class="alert alert-danger p-2 small text-start">
                    Please correct the validation items below.
                </div>
            {% endif %}

            {{ form.as_p }}
            
            <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-semibold">Create Core Profile</button>
        </form>
        
        <div class="mt-4 border-top pt-3 small text-muted">
            Already registered? <a href="{% url 'login' %}" class="text-primary text-decoration-none fw-bold">Access Console</a>
        </div>
    </div>

    <script>
        // Clean Bootstrap styling integration for generated Django inputs
        document.querySelectorAll('input').forEach(input => {
            if (input.type !== 'checkbox') {
                input.classList.add('form-control');
            }
        });
    </script>
</body>
</html>

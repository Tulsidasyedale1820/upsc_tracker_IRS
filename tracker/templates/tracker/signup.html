<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRS UPSC Study Matrix - Create Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 440px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-primary { background: #2563eb; border: none; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h3 class="fw-bold text-primary mb-1">IRS Portal</h3>
        <p class="text-secondary small fw-bold text-uppercase mb-4">UPSC Study Matrix</p>
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            <div class="row g-2 mb-2">
                <div class="col-6">
                    <label class="form-label small fw-bold text-secondary">Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="col-6">
                    <label class="form-label small fw-bold text-secondary">Surname</label>
                    <input type="text" name="surname" class="form-control" required>
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold text-secondary">User ID</label>
                <input type="text" name="userid" class="form-control" required>
            </div>
            <div class="mb-2">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Mobile Number</label>
                <input type="text" name="mobile" class="form-control" placeholder="10-digit primary line" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Proceed to Verification</button>
        </form>
        <div class="mt-3 small">
            <a href="{% url 'login' %}" class="text-muted text-decoration-none">Back to Login</a>
        </div>
    </div>
</body>
</html>

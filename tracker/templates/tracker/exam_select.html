<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Select Your Focus Engine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card-custom { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 2.5rem; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
        .btn-exam { background: #2563eb; color: white; padding: 12px; font-weight: 600; border-radius: 8px; transition: 0.2s; }
        .btn-exam:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <div class="card-custom text-center">
            <h2 class="mb-4 fw-bold">Select Active Target</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-4 text-start">
                    <label class="form-label text-secondary fw-semibold">Choose Blueprint Matrix</label>
                    <select class="form-select bg-dark text-white border-secondary" name="exam_name" id="examSelect" onchange="toggleCustomInput()" required>
                        <option value="UPSC">UPSC Civil Services</option>
                        <option value="MPSC">MPSC State Services</option>
                        <option value="CUSTOM">+ Add Custom Target Exam</option>
                    </select>
                </div>

                <div class="mb-4 text-start d-none" id="customInputBlock">
                    <label class="form-label text-warning fw-semibold">Enter Custom Exam Designation</label>
                    <input type="text" class="form-control bg-dark text-white border-warning" name="custom_exam_name" placeholder="e.g., Bank PO, SSC CGL">
                </div>

                <button type="submit" class="btn btn-exam w-100 mt-2">Initialize Study Workspace</button>
            </form>
        </div>
    </div>

    <script>
        function toggleCustomInput() {
            var select = document.getElementById('examSelect');
            var customBlock = document.getElementById('customInputBlock');
            if (select.value === 'CUSTOM') {
                customBlock.classList.remove('d-none');
            } else {
                customBlock.classList.add('d-none');
            }
        }
    </script>
</body>
</html>

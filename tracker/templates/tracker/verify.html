<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRS UPSC Study Matrix - Verification</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-success { background: #16a34a; border: none; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h3 class="fw-bold text-primary mb-1">IRS Portal</h3>
        <p class="text-secondary small fw-bold text-uppercase mb-4">UPSC Study Matrix</p>
        
        <div class="alert alert-info small">Verification security code dispatched to <b>{{ mobile }}</b></div>
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Enter Verification OTP Code</label>
                <input type="text" class="form-control text-center fs-4 tracking-wider" placeholder="000000" required>
            </div>
            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Validate & Complete Setup</button>
        </form>
    </div>
</body>
</html>

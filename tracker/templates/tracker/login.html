<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRS UPSC Study Matrix - Authentication Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border: 1px solid #e2e8f0; border-radius: 12px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-primary { background: #2563eb; border: none; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h3 class="fw-bold text-primary mb-1">IRS Portal</h3>
        <p class="text-secondary small fw-bold text-uppercase mb-4">UPSC Study Matrix</p>
        
        {% if error %}<div class="alert alert-danger small py-2">{{ error }}</div>{% endif %}
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small fw-bold text-secondary">User ID</label>
                <input type="text" name="userid" class="form-control" required>
            </div>
            <div class="mb-4">
                <label class="form-label small fw-bold text-secondary">Password</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">Access Console</button>
        </form>
        <div class="mt-4 border-top pt-3 small">
            New operator? <a href="{% url 'signup' %}" class="text-primary text-decoration-none fw-bold">Create New User</a>
        </div>
    </div>
</body>
</html>

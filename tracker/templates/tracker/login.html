<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IRS Portal - Authentication Console</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; color: #1e293b; font-family: system-ui; height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); }
        .btn-primary { background: #2563eb; border: none; }
        .btn-primary:hover { background: #1d4ed8; }
        .form-control { background: #ffffff !important; color: #0f172a !important; border: 1px solid #cbd5e1 !important; }
    </style>
</head>
<body>
    <div class="auth-card text-center">
        <h2 class="fw-bold text-primary mb-1">IRS Portal</h2>
        <p class="text-secondary small fw-bold tracking-wider text-uppercase mb-4">UPSC Study Time Matrix</p>
        
        <form method="POST" class="text-start">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3 py-2 fw-semibold">Access System Console</button>
        </form>
        <div class="mt-4 border-top pt-3 small text-muted">
            New operator? <a href="{% url 'signup' %}" class="text-primary text-decoration-none fw-bold">Initialize Profile</a>
        </div>
    </div>
</body>
</html>
